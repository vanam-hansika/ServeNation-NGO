<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — ServeNation NGO</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <style>
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      background: var(--white);
      padding: var(--space-8);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
    }
    .login-header {
      text-align: center;
      margin-bottom: var(--space-6);
    }
    .login-logo {
      font-size: 3rem;
      margin-bottom: var(--space-2);
    }
  </style>
</head>
<body style="background: var(--gray-50);">

  <div class="container">
    <div class="login-container animate-fade-up">
      <div class="login-header">
        <div class="login-logo">🔒</div>
        <h2>Admin Portal</h2>
        <p class="text-muted">Sign in to manage volunteers</p>
      </div>

      <form id="adminForm">
        <div class="form-group">
          <label for="adminEmail" class="form-label">Email Address</label>
          <input type="email" id="adminEmail" class="form-input" required placeholder="admin@servenation.org" />
        </div>
        
        <div class="form-group">
          <label for="adminPassword" class="form-label">Password</label>
          <input type="password" id="adminPassword" class="form-input" required placeholder="••••••••" />
        </div>

        <p class="form-error" id="loginError" style="text-align: center; margin-bottom: var(--space-4); margin-top: -var(--space-2);"><i class="fas fa-exclamation-circle"></i> <span></span></p>

        <button type="submit" id="loginBtn" class="btn btn-primary w-full btn-lg">
          <i class="fas fa-sign-in-alt"></i> Login to Dashboard
        </button>
      </form>
    </div>
  </div>

  <script src="admin-login.js" type="module"></script>
</body>
</html>
